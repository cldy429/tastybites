<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script type="module" src="../js/main.js" defer></script>
</head>

<body>
    <header>
        <a class="logo transition-link" href="../index.html" aria-label="TastyBites Home">
            <span class="logo-icon"><i class="fa-solid fa-bowl-food"></i></span>
            <span class="logo-text">TastyBites</span>
        </a>
        <nav>
            <ul>
                <li><a href="../index.html">Нүүр</a></li>
                <li><a href="recipes.html">Жорууд</a></li>
                <li><a href="admin.html" class="active">Admin</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <button class="login" onclick="logout()">Logout</button>
        </div>
        <button class="hamburger" type="button" aria-label="Open menu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <main class="admin-container" id="adminPanel">
        <aside class="admin-sidebar">
            <h3>Админ Панел</h3>
            <ul>
                <li><a href="#dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                <li><a href="#recipeForm"><i class="fa-solid fa-plus"></i> Жор нэмэх</a></li>
                <li><a href="#recipeTable"><i class="fa-solid fa-list"></i> Жор удирдах</a></li>
            </ul>
            <button class="admin-reset" type="button" id="adminResetData">Data reset</button>
        </aside>

        <section class="admin-content">
            <section class="admin-top" id="dashboard">
                <div>
                    <h1>Recipe Dashboard</h1>
                    <p>Жор нэмэх, засах, устгах өөрчлөлтүүд browser-ийн localStorage дээр хадгалагдана.</p>
                </div>
                <a class="admin-view-site transition-link" href="recipes.html">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    Жорууд харах
                </a>
            </section>

            <section class="admin-stats" id="adminStats"></section>

            <section class="admin-card" id="recipeForm">
                <div class="admin-section-header">
                    <h2 id="adminFormTitle">Шинэ жор нэмэх</h2>
                    <button type="button" class="admin-secondary" id="adminCancelEdit" hidden>Болих</button>
                </div>

                <form class="admin-form" id="adminRecipeForm">
                    <div class="admin-form-grid">
                        <label>
                            <span>Жорын нэр</span>
                            <input type="text" name="title" placeholder="Жорын нэр" required>
                        </label>
                        <label>
                            <span>Төрөл</span>
                            <select name="category" required></select>
                        </label>
                        <label>
                            <span>Зурагны path</span>
                            <input type="text" name="image" placeholder="images/sandwich.png">
                        </label>
                        <label>
                            <span>Хугацаа</span>
                            <input type="number" name="time" min="1" required>
                        </label>
                        <label>
                            <span>Порц</span>
                            <input type="number" name="servings" min="1" required>
                        </label>
                        <label>
                            <span>Rating</span>
                            <input type="number" name="rating" min="0" max="5" step="0.1" required>
                        </label>
                        <label>
                            <span>Reviews</span>
                            <input type="number" name="reviews" min="0" required>
                        </label>
                    </div>

                    <label>
                        <span>Тайлбар</span>
                        <textarea name="description" placeholder="Жорын товч тайлбар" required></textarea>
                    </label>

                    <div class="admin-form-grid two">
                        <label>
                            <span>Орц</span>
                            <textarea name="ingredients" placeholder="Нэг мөрөнд нэг орц"></textarea>
                        </label>
                        <label>
                            <span>Хийх дараалал</span>
                            <textarea name="instructions" placeholder="Нэг мөрөнд нэг алхам"></textarea>
                        </label>
                    </div>

                    <div class="admin-form-grid">
                        <label>
                            <span>Calories</span>
                            <input type="text" name="calories">
                        </label>
                        <label>
                            <span>Protein</span>
                            <input type="text" name="protein">
                        </label>
                        <label>
                            <span>Carbs</span>
                            <input type="text" name="carbs">
                        </label>
                        <label>
                            <span>Fat</span>
                            <input type="text" name="fat">
                        </label>
                    </div>

                    <button type="submit" class="admin-submit">Хадгалах</button>
                </form>
            </section>

            <section class="admin-card" id="featuredSection">
                <div class="admin-section-header">
                    <h2><i class="fa-solid fa-star" style="color: orange;"></i> Онцлох жорууд</h2>
                </div>
                <div class="featured-grid" id="featuredGrid"></div>
            </section>

            <section class="admin-card" id="recipeTable">
                <div class="admin-section-header">
                    <h2>Бүртгэлтэй жорууд</h2>
                    <div class="admin-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="adminSearch" placeholder="Жор хайх...">
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Нэр</th>
                                <th>Төрөл</th>
                                <th>Хугацаа</th>
                                <th>Төлөв</th>
                                <th>Үйлдэл</th>
                            </tr>
                        </thead>
                        <tbody id="adminRecipeRows"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <footer></footer>
</body>

</html>
